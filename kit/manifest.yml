# Manifest for the personal-background kit.
# The upgrade skill compares kit_version here (upstream) against
# .pbg/settings.yml kit_version (installed) to decide what to merge.
kit_version: "2.0.5"
changelog:
  - version: "2.0.5"
    date: "2026-07-04"
    notes:
      - "AGENTS.md is now user-owned: generated by bootstrap from kit/templates/AGENTS.md."
      - "MCP search output grouped by file; matches tags and filenames."
      - "Add link-project skill to connect other projects to personal-background."
  - version: "2.0.4"
    date: "2026-07-04"
    notes:
      - "Harden MCP entry filename validation: reject path traversal and invalid names."
      - "Add MCP tools read_episode and read_note."
      - "MCP server falls back to repo_path from .pbg/settings.yml."
      - "Profile template adds Online Presence section."
  - version: "2.0.3"
    date: "2026-07-04"
    notes:
      - "complete-profile entity search now explicitly covers public identity links (blog, GitHub, portfolio, etc.)."
  - version: "2.0.2"
    date: "2026-07-04"
    notes:
      - "MCP server supports both Node and Bun runtimes."
      - "complete-profile skill can offer to search public entities with consent."
      - "AGENTS.md/README emphasize AI-first usage."
  - version: "2.0.1"
    date: "2026-07-04"
    notes:
      - "Recommend forking the repo as your private data home."
      - "Bootstrap prompt asks for preferred language first."
  - version: "2.0.0"
    date: "2026-07-04"
    notes:
      - "Clean-slate kit: bootstrap prompt, kit/ layout."
      - "First-class MCP bridge with search and language awareness."
      - "New skills: localize, import, upgrade."
